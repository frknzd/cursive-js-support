<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
    <defs>
        <linearGradient id="cjss-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <!-- ClojureScript Blue -->
            <stop offset="0%" stop-color="#5881D8" />

            <!-- ClojureScript Green -->
            <stop offset="50%" stop-color="#91DC47" />

            <!-- JavaScript Yellow -->
            <stop offset="100%" stop-color="#F7DF1E" />
        </linearGradient>
    </defs>

    <!-- Text: cjss -->
    <text x="20" y="20"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
          font-size="18"
          font-weight="900"
          text-anchor="middle"
          fill="url(#cjss-gradient)"
          letter-spacing="-0.5">cjss</text>
</svg>